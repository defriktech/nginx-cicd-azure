name: Advanced CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  # -------------------------
  # 1. TEST STAGE
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run tests
        run: |
          chmod +x test.sh
          ./test.sh

  # -------------------------
  # 2. BUILD STAGE
  # -------------------------
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-app .

  # -------------------------
  # 3. DEPLOY TO VM1
  # -------------------------
  deploy_vm1:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VM1
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM1_IP }}
          username: azureuser
          key: ${{ secrets.SSH_KEY_VM1 }}
          source: "."
          target: "/home/azureuser/app"

      - name: Deploy on VM1 with rollback
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM1_IP }}
          username: azureuser
          key: ${{ secrets.SSH_KEY_VM1 }}
          script: |
            set -ex

            echo "Connected to VM1"
            whoami
            pwd

            # Ensure app directory exists
            mkdir -p /home/azureuser/app
            cd /home/azureuser/app

            echo "Listing files:"
            ls -la

            echo "Checking Docker..."
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
            fi

            echo "Backing up current image..."
            sudo docker tag devops-app devops-app:backup || true

            echo "Building new image..."
            sudo docker build -t devops-app .

            echo "Stopping old container..."
            sudo docker rm -f web || true

            echo "Starting new container..."
            if sudo docker run -d -p 80:80 --name web devops-app; then
              echo "VM1 deployment successful ✅"
            else
              echo "VM1 deployment failed ❌ Rolling back..."
              sudo docker run -d -p 80:80 --name web devops-app:backup
            fi

  # -------------------------
  # 4. DEPLOY TO VM2 (SEQUENTIAL)
  # -------------------------
  deploy_vm2:
    runs-on: ubuntu-latest
    needs: deploy_vm1

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy files to VM2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM2_IP }}
          username: azureuser
          key: ${{ secrets.SSH_KEY_VM2 }}
          source: "."
          target: "/home/azureuser/app"

      - name: Deploy on VM2 with rollback
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM2_IP }}
          username: azureuser
          key: ${{ secrets.SSH_KEY_VM2 }}
          script: |
            set -ex

            echo "Connected to VM2"
            whoami
            pwd

            mkdir -p /home/azureuser/app
            cd /home/azureuser/app

            echo "Listing files:"
            ls -la

            echo "Checking Docker..."
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt update
              sudo apt install docker.io -y
              sudo systemctl start docker
            fi

            echo "Backing up current image..."
            sudo docker tag devops-app devops-app:backup || true

            echo "Building new image..."
            sudo docker build -t devops-app .

            echo "Stopping old container..."
            sudo docker rm -f web || true

            echo "Starting new container..."
            if sudo docker run -d -p 80:80 --name web devops-app; then
              echo "VM2 deployment successful ✅"
            else
              echo "VM2 deployment failed ❌ Rolling back..."
              sudo docker run -d -p 80:80 --name web devops-app:backup
            fi
